<section class="profile-page">
    <h2>Mi Perfil</h2>
    <p>Edita tu información de recluta.</p>

    <div class="profile-field">
        <label class="a-label">Nombre de usuario</label>
        <input type="text" class="a-input" placeholder="Ej: Mario_Coder">
    </div>

    <div class="profile-field">
        <label class="a-label">Correo electrónico</label>
        <input type="email" class="a-input" placeholder="tu@email.com">
    </div>

    <div class="profile-actions">
        <button class="a-btn a-btn--primary">Guardar cambios</button>
    </div>
</section>
