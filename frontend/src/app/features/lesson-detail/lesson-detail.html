<div class="lesson-container">
    @if (lesson()) {
    <h1 class="lesson-title">{{ lesson()?.title }}</h1>
    <div class="lesson-meta">
        <span class="badge">{{ lesson()?.level }}</span>
        <span class="duration">⏱️ {{ lesson()?.duration }} min</span>
    </div>

    <hr>

    <div class="lesson-content">
        <p class="lesson-description">{{ lesson()?.description }}</p>

        <div class="full-text">
            <markdown [data]="lesson()?.content"></markdown>
        </div>
    </div>

    <footer class="m-lesson-actions" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e0e0e0;">
        <button (click)="toggleComplete()" class="a-btn"
            [ngClass]="lesson()?.completed ? 'a-btn--success' : 'a-btn--primary'"
            style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
            <span>{{ lesson()?.completed ? '✅ Lección Completada' : '✔ Marcar como Completada' }}</span>
        </button>
    </footer>

    } @else {
    <div class="loading">
        <p>Cargando contenido de la lección...</p>
    </div>
    }
</div>
