<div class="achievements-container">

  <div class="achievements-header">
    <a routerLink="/dashboard" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Volver
    </a>
    <h1>Logros</h1>
    <p>{{ unlockedCount }} de {{ achievements.length }} logros desbloqueados</p>
  </div>

  <div class="achievements-summary">
    <div class="summary-bar">
      <div class="summary-bar-fill" [style.width.%]="(unlockedCount / achievements.length) * 100"></div>
    </div>
    <span>{{ unlockedCount }}/{{ achievements.length }}</span>
  </div>

  <div class="achievements-grid">
    <div
      class="achievement-card"
      *ngFor="let achievement of achievements"
      [class.unlocked]="achievement.unlocked"
      [class.locked]="!achievement.unlocked"
    >
      <div class="achievement-icon">
        @if (achievement.unlocked) {
          <span>{{ achievement.icon }}</span>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        }
      </div>
      <div class="achievement-info">
        <span class="achievement-title">{{ achievement.title }}</span>
        <span class="achievement-desc">{{ achievement.description }}</span>
        <span class="achievement-date" *ngIf="achievement.unlocked">{{ achievement.unlockedAt }}</span>
      </div>
      <div class="achievement-badge" *ngIf="achievement.unlocked">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
    </div>
  </div>

</div>
