<div class="profesor-container">

  <div class="profesor-header">
    <div class="profesor-info">
      <span class="profesor-avatar">{{ profesor.avatar }}</span>
      <div>
        <h1>Bienvenido, {{ profesor.name }}</h1>
        <p>{{ profesor.email }}</p>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">🚪 Cerrar sesión</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats">
      <span class="stat-icon">{{ stat.icon }}</span>
      <span class="stat-value">{{ stat.value }}</span>
      <span class="stat-label">{{ stat.label }}</span>
    </div>
  </div>

  <div class="alumnos-section">
    <h2>Progreso de alumnos</h2>
    <div class="alumnos-list">
      <div class="alumno-card" *ngFor="let alumno of alumnos">
        <div class="alumno-info">
          <span class="alumno-avatar">👤</span>
          <div>
            <span class="alumno-name">{{ alumno.name }}</span>
            <span class="alumno-lessons">{{ alumno.completedLessons }} lecciones completadas</span>
          </div>
        </div>
        <div class="alumno-progress">
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="alumno.progress"></div>
          </div>
          <span class="progress-label">{{ alumno.progress }}%</span>
        </div>
      </div>
    </div>
  </div>

</div>
